<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片格式转换 - 工具箱</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .tabs { display:flex; gap:0; border-bottom:2px solid #e5e7eb; margin-bottom:20px; }
    .tab-btn { padding:9px 18px; border:none; background:none; font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
    .tab-btn.active { color:#6366f1; border-bottom-color:#6366f1; }
    .tab-panel { display:none; } .tab-panel.active { display:block; }

    .fmt-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .fmt-btn { padding:7px 14px; border:1.5px solid #e5e7eb; border-radius:8px; background:#fff; font-size:13px; font-weight:700; color:#374151; cursor:pointer; transition:all 0.15s; }
    .fmt-btn:hover { border-color:#6366f1; background:#f5f3ff; }
    .fmt-btn.active { border-color:#6366f1; background:#ede9fe; color:#4f46e5; }

    .b64-area { width:100%; min-height:120px; padding:10px 12px; border:1.5px solid #e5e7eb; border-radius:9px; font-size:11px; font-family:monospace; resize:vertical; outline:none; transition:border-color 0.15s; }
    .b64-area:focus { border-color:#6366f1; }
    .b64-actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .b64-actions .btn { margin-top:0; width:auto; padding:8px 16px; font-size:13px; }
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/" class="logo">🧰 工具箱</a>
  <span style="font-size:13px;color:#6b7280;font-weight:600">🔄 图片格式转换</span>
</nav>

<div class="page">
<div class="card">
  <h1>图片格式转换</h1>
  <p class="subtitle">JPG / PNG / WebP / AVIF 格式互转，图片与 Base64 互转</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="fmt">格式转换</button>
    <button class="tab-btn" data-tab="enc">图片 → Base64</button>
    <button class="tab-btn" data-tab="dec">Base64 → 图片</button>
  </div>

  <!-- 格式转换 -->
  <div class="tab-panel active" id="tab-fmt">
    <div class="drop-zone" id="fmtDrop">
      <input type="file" id="fmtInput" accept="image/*">
      <div class="drop-icon">🔄</div>
      <div class="drop-text">点击选择或拖拽图片</div>
      <div class="drop-hint">JPG · PNG · WebP · AVIF · GIF 等</div>
    </div>

    <div id="fmtOptions" style="display:none">
      <div class="section">
        <div class="section-title">目标格式</div>
        <div class="fmt-grid" id="fmtGrid">
          <button class="fmt-btn" data-fmt="jpeg">JPEG</button>
          <button class="fmt-btn active" data-fmt="png">PNG</button>
          <button class="fmt-btn" data-fmt="webp">WebP</button>
          <button class="fmt-btn" data-fmt="avif">AVIF</button>
        </div>

        <div class="slider-group" id="qualGroup">
          <div class="slider-row">
            <span class="slider-label">输出质量（有损格式）</span>
            <span class="slider-value" id="fmtQualVal">85%</span>
          </div>
          <input type="range" id="fmtQualSlider" min="1" max="100" value="85">
        </div>
      </div>
      <button class="btn btn-primary" id="fmtBtn">开始转换</button>
    </div>

    <div class="progress-area" id="fmtProgress">
      <div class="progress-bar-wrap"><div class="progress-bar" id="fmtBar"></div></div>
      <div class="progress-text">转换中...</div>
    </div>
    <div class="result" id="fmtResult"></div>
  </div>

  <!-- 图片 → Base64 -->
  <div class="tab-panel" id="tab-enc">
    <div class="drop-zone" id="encDrop">
      <input type="file" id="encInput" accept="image/*">
      <div class="drop-icon">📤</div>
      <div class="drop-text">点击选择或拖拽图片</div>
      <div class="drop-hint">转换为 data:image/…;base64,… 格式</div>
    </div>
    <div id="encResult" style="display:none;margin-top:14px">
      <label style="font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:5px">Base64 数据（可直接用于 HTML img src）</label>
      <textarea class="b64-area" id="encOutput" readonly></textarea>
      <div class="b64-actions">
        <button class="btn btn-gray" id="encCopy">📋 复制</button>
        <span style="font-size:12px;color:#9ca3af;align-self:center" id="encSize"></span>
      </div>
    </div>
  </div>

  <!-- Base64 → 图片 -->
  <div class="tab-panel" id="tab-dec">
    <label style="font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:5px">粘贴 Base64 数据</label>
    <textarea class="b64-area" id="decInput" placeholder="data:image/png;base64,iVBORw0K...  或纯 base64 字符串"></textarea>
    <div class="b64-actions">
      <button class="btn btn-primary" id="decBtn">解码并下载</button>
    </div>
    <div class="progress-area" id="decProgress">
      <div class="progress-bar-wrap"><div class="progress-bar" id="decBar"></div></div>
      <div class="progress-text">处理中...</div>
    </div>
    <div class="result" id="decResult"></div>
  </div>
</div>
</div>

<script src="/common.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(2) + ' MB';

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── 格式转换 ──
let fmtFile = null, targetFmt = 'png', _fmtFile = null, _decFile2 = null;
document.querySelectorAll('#fmtGrid .fmt-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#fmtGrid .fmt-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); targetFmt = b.dataset.fmt;
    $('qualGroup').style.opacity = targetFmt === 'png' ? '0.4' : '1';
  });
});
$('fmtQualSlider').addEventListener('input', () => { $('fmtQualVal').textContent = $('fmtQualSlider').value + '%'; });

function setFmtFile(f) {
  fmtFile = f; $('fmtOptions').style.display = 'block'; $('fmtResult').classList.remove('show');
  $('fmtDrop').querySelector('.drop-text').textContent = f.name;
}
$('fmtInput').addEventListener('change', e => { if (e.target.files[0]) setFmtFile(e.target.files[0]); });
const fd2 = $('fmtDrop');
fd2.addEventListener('dragover', e => { e.preventDefault(); fd2.classList.add('drag-over'); });
fd2.addEventListener('dragleave', () => fd2.classList.remove('drag-over'));
fd2.addEventListener('drop', e => { e.preventDefault(); fd2.classList.remove('drag-over'); if (e.dataTransfer.files[0]) setFmtFile(e.dataTransfer.files[0]); });

$('fmtBtn').addEventListener('click', async () => {
  if (!fmtFile) return;
  $('fmtBtn').disabled = true; $('fmtBtn').textContent = '转换中...';
  $('fmtProgress').classList.add('show'); $('fmtBar').style.width = '0%';
  setTimeout(() => { $('fmtBar').style.width = '80%'; }, 50);

  const form = new FormData();
  form.append('image', fmtFile);
  form.append('target', targetFmt);
  form.append('quality', $('fmtQualSlider').value);

  try {
    const data = await fetch('/api/img-convert', { method: 'POST', body: form }).then(r => r.json());
    $('fmtBar').style.width = '100%';
    setTimeout(() => $('fmtProgress').classList.remove('show'), 300);

    if (!data.success) { showFmtError(data.error); return; }
    _fmtFile = data.file;
    $('fmtResult').classList.add('show');
    $('fmtResult').innerHTML = `
      <div class="result-header ok"><span class="result-icon">✅</span><span class="result-title">转换成功！</span></div>
      <div class="result-body">
        <div class="stats">
          <div class="stat-box"><div class="stat-value">${fmtSize(data.originalSize)}</div><div class="stat-label">原始大小</div></div>
          <div class="stat-box"><div class="stat-value green">${fmtSize(data.convertedSize)}</div><div class="stat-label">转换后</div></div>
          <div class="stat-box"><div class="stat-value">${data.ext.toUpperCase()}</div><div class="stat-label">输出格式</div></div>
        </div>
        <button class="btn btn-success" onclick="downloadFile(_fmtFile)">⬇ 下载 ${data.ext.toUpperCase()}</button>
      </div>`;
  } catch { showFmtError('网络错误'); $('fmtProgress').classList.remove('show'); }
  finally { $('fmtBtn').disabled = false; $('fmtBtn').textContent = '开始转换'; }
});
function showFmtError(msg) {
  $('fmtResult').classList.add('show');
  $('fmtResult').innerHTML = `<div class="result-header fail"><span class="result-icon">❌</span><span class="result-title">失败</span></div><div class="result-body"><p class="error-msg">${msg}</p></div>`;
}

// ── 图片 → Base64 ──
$('encInput').addEventListener('change', e => { if (e.target.files[0]) encodeImg(e.target.files[0]); });
const ed = $('encDrop');
ed.addEventListener('dragover', e => { e.preventDefault(); ed.classList.add('drag-over'); });
ed.addEventListener('dragleave', () => ed.classList.remove('drag-over'));
ed.addEventListener('drop', e => { e.preventDefault(); ed.classList.remove('drag-over'); if (e.dataTransfer.files[0]) encodeImg(e.dataTransfer.files[0]); });

function encodeImg(f) {
  const reader = new FileReader();
  reader.onload = ev => {
    const b64 = ev.target.result;
    $('encOutput').value = b64;
    $('encSize').textContent = `${fmtSize(f.size)} → ${fmtSize(b64.length)} 字符`;
    $('encResult').style.display = 'block';
  };
  reader.readAsDataURL(f);
}
$('encCopy').addEventListener('click', () => {
  navigator.clipboard.writeText($('encOutput').value);
  $('encCopy').textContent = '✓ 已复制';
  setTimeout(() => $('encCopy').textContent = '📋 复制', 1500);
});

// ── Base64 → 图片 ──
$('decBtn').addEventListener('click', async () => {
  let raw = $('decInput').value.trim();
  if (!raw) { alert('请粘贴 Base64 数据'); return; }
  // 若不带前缀，尝试加默认前缀
  if (!raw.startsWith('data:')) raw = 'data:image/png;base64,' + raw;

  $('decBtn').disabled = true; $('decBtn').textContent = '处理中...';
  $('decProgress').classList.add('show'); $('decBar').style.width = '0%';
  setTimeout(() => { $('decBar').style.width = '80%'; }, 50);

  try {
    const data = await fetch('/api/img-from-base64', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl: raw })
    }).then(r => r.json());

    $('decBar').style.width = '100%';
    setTimeout(() => $('decProgress').classList.remove('show'), 300);

    if (!data.success) { showDecError(data.error); return; }
    _decFile2 = data.file;
    $('decResult').classList.add('show');
    $('decResult').innerHTML = `
      <div class="result-header ok"><span class="result-icon">✅</span><span class="result-title">解码成功！</span></div>
      <div class="result-body">
        <div class="info-row">文件大小 <strong>${fmtSize(data.size)}</strong> · 格式 <strong>${data.ext.toUpperCase()}</strong></div>
        <button class="btn btn-success" onclick="downloadFile(_decFile2)">⬇ 下载图片</button>
      </div>`;
  } catch { showDecError('请求失败，请检查数据格式'); $('decProgress').classList.remove('show'); }
  finally { $('decBtn').disabled = false; $('decBtn').textContent = '解码并下载'; }
});
function showDecError(msg) {
  $('decResult').classList.add('show');
  $('decResult').innerHTML = `<div class="result-header fail"><span class="result-icon">❌</span><span class="result-title">失败</span></div><div class="result-body"><p class="error-msg">${msg}</p></div>`;
}

setupPaste(t => t.startsWith('image/'), f => {
  const tab = document.querySelector('.tab-btn.active').dataset.tab;
  if (tab === 'enc') { encodeImg(f); }
  else { if (tab !== 'fmt') document.querySelector('[data-tab="fmt"]').click(); setFmtFile(f); }
});
</script>
</body>
</html>
