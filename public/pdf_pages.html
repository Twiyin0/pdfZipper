<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 页面管理 - PDF 工具箱</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .op-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .op-tab {
      flex: 1; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 9px;
      background: #fff; cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .op-tab:hover { border-color: #6366f1; background: #f5f3ff; }
    .op-tab.active { border-color: #6366f1; background: #ede9fe; }
    .op-tab .ot-icon { font-size: 22px; margin-bottom: 3px; }
    .op-tab .ot-name { font-size: 12px; font-weight: 600; color: #374151; }
    .op-tab.active .ot-name { color: #4f46e5; }
    .op-tab .ot-desc { font-size: 11px; color: #9ca3af; }

    .pages-input {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 9px;
      font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    .pages-input:focus { border-color: #6366f1; }
    .pages-hint { font-size: 12px; color: #9ca3af; margin-top: 6px; }
    .pages-preview { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .page-tag {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    }
    .page-tag.remove { background: #fee2e2; color: #991b1b; }
    .page-tag.extract { background: #ede9fe; color: #5b21b6; }

    .warn-box {
      background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
      padding: 10px 12px; font-size: 12px; color: #92400e; margin-top: 10px;
    }
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/" class="logo">📦 PDF 工具箱</a>
  <div class="nav-links">
    <a href="/pdf_compress.html">🗜️ 压缩</a>
    <a href="/pdf_merge.html">🔗 合并</a>
    <a href="/pdf_split.html">✂️ 拆分</a>
    <a href="/pdf_rotate.html">🔄 旋转</a>
    <a href="/pdf_pages.html" class="active">📑 页面管理</a>
    <a href="/pdf_compare.html">🔍 比对</a>
    <a href="/img_to_pdf.html">🖼️ 图转PDF</a>
    <a href="/pdf_to_img.html">📸 PDF转图</a>
  </div>
</nav>

<div class="page">
<div class="card">
  <h1>PDF 页面管理</h1>
  <p class="subtitle">删除不需要的页面，或提取指定页面为新 PDF</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf,application/pdf">
    <div class="drop-icon">📑</div>
    <div class="drop-text">点击选择或拖拽 PDF 文件</div>
    <div class="drop-hint">最大支持 200 MB</div>
  </div>

  <div id="fileInfo" style="display:none">
    <div class="file-list">
      <div class="file-item" style="cursor:default">
        <span class="fi-icon">📄</span>
        <div class="fi-details">
          <div class="fi-name" id="fileName"></div>
          <div class="fi-meta" id="fileMeta"></div>
        </div>
        <button class="fi-remove" id="removeBtn">✕</button>
      </div>
    </div>
  </div>

  <div class="section" id="options" style="display:none">
    <div class="section-title">操作类型</div>
    <div class="op-tabs">
      <div class="op-tab active" data-op="remove">
        <div class="ot-icon">🗑️</div>
        <div class="ot-name">删除页面</div>
        <div class="ot-desc">从 PDF 中移除指定页</div>
      </div>
      <div class="op-tab" data-op="extract">
        <div class="ot-icon">📤</div>
        <div class="ot-name">提取页面</div>
        <div class="ot-desc">仅保留指定页为新 PDF</div>
      </div>
    </div>

    <div class="section-title" id="inputLabel">要删除的页码</div>
    <input type="text" class="pages-input" id="pagesInput" placeholder="例如：1, 3, 5-8">
    <p class="pages-hint">用逗号分隔，支持范围（如 5-8）和单页（如 3）</p>
    <div class="pages-preview" id="pagesPreview"></div>
    <div class="warn-box" id="warnBox" style="display:none"></div>
  </div>

  <button class="btn btn-primary" id="actionBtn" disabled>选择文件后继续</button>

  <div class="progress-area" id="progressArea">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">正在处理...</div>
  </div>

  <div class="result" id="result"></div>
</div>
</div>

<script src="/common.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmtSize = b => b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(2) + ' MB';

let selectedFile = null;
let op = 'remove';
let totalPages = 0;
let _dlFile = null;

document.querySelectorAll('.op-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.op-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    op = tab.dataset.op;
    $('inputLabel').textContent = op === 'remove' ? '要删除的页码' : '要提取的页码';
    $('actionBtn').textContent = op === 'remove' ? '删除页面' : '提取页面';
    updatePreview();
  });
});

function parseRanges(str, total) {
  return str.split(',').map(s => s.trim()).filter(Boolean).flatMap(part => {
    const m = part.match(/^(\d+)(?:-(\d+))?$/);
    if (!m) return [];
    const s = Math.max(1, +m[1]) - 1;
    const e = m[2] ? Math.min(total, +m[2]) - 1 : s;
    return s <= e && s < total ? [[s, e]] : [];
  });
}

function getPageSet(str, total) {
  const segs = parseRanges(str, total);
  const set = new Set();
  for (const [s, e] of segs) for (let i = s; i <= e; i++) set.add(i + 1);
  return set;
}

function updatePreview() {
  if (!selectedFile) return;
  const val = $('pagesInput').value;
  const pages = getPageSet(val, totalPages);
  const preview = $('pagesPreview');
  const warn = $('warnBox');

  if (!val.trim()) { preview.innerHTML = ''; warn.style.display = 'none'; updateBtn(); return; }

  const cls = op === 'remove' ? 'remove' : 'extract';
  preview.innerHTML = [...pages].sort((a,b)=>a-b).map(p =>
    `<span class="page-tag ${cls}">第 ${p} 页</span>`
  ).join('');

  if (op === 'remove' && pages.size >= totalPages && totalPages > 0) {
    warn.style.display = 'block';
    warn.textContent = '⚠️ 不能删除全部页面，请至少保留一页';
  } else {
    warn.style.display = 'none';
  }
  updateBtn();
}

function updateBtn() {
  if (!selectedFile) { $('actionBtn').disabled = true; return; }
  const val = $('pagesInput').value;
  const pages = getPageSet(val, totalPages);
  const invalid = op === 'remove' && pages.size >= totalPages && totalPages > 0;
  $('actionBtn').disabled = pages.size === 0 || invalid;
  if (pages.size > 0 && !invalid) {
    $('actionBtn').textContent = op === 'remove'
      ? `删除 ${pages.size} 页`
      : `提取 ${pages.size} 页`;
  } else {
    $('actionBtn').textContent = op === 'remove' ? '删除页面' : '提取页面';
  }
}

$('pagesInput').addEventListener('input', updatePreview);

function selectFile(file) {
  if (!file || file.type !== 'application/pdf') { alert('请选择 PDF 文件'); return; }
  selectedFile = file;
  $('fileName').textContent = file.name;
  $('fileMeta').textContent = fmtSize(file.size);
  $('fileInfo').style.display = 'block';
  $('options').style.display = 'block';
  $('result').classList.remove('show');
  totalPages = 0; // 先置 0，操作后从响应获取
  updateBtn();
}

function clearFile() {
  selectedFile = null; totalPages = 0; $('fileInput').value = '';
  $('fileInfo').style.display = 'none';
  $('options').style.display = 'none';
  $('actionBtn').disabled = true;
  $('actionBtn').textContent = '选择文件后继续';
  $('result').classList.remove('show');
  $('pagesPreview').innerHTML = '';
  $('warnBox').style.display = 'none';
}

$('fileInput').addEventListener('change', e => { if (e.target.files[0]) selectFile(e.target.files[0]); });
$('removeBtn').addEventListener('click', clearFile);
const dz = $('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]); });

function animateTo(target, ms) {
  const start = parseFloat($('progressBar').style.width) || 0;
  const t0 = Date.now();
  (function step() {
    const pct = Math.min(start + (target - start) * (Date.now() - t0) / ms, target);
    $('progressBar').style.width = pct + '%';
    if (pct < target) requestAnimationFrame(step);
  })();
}

$('actionBtn').addEventListener('click', async () => {
  if (!selectedFile) return;
  const pagesVal = $('pagesInput').value;
  const endpoint = op === 'remove' ? '/api/remove-pages' : '/api/extract-pages';

  $('actionBtn').disabled = true; $('actionBtn').textContent = '处理中...';
  $('result').classList.remove('show');
  $('progressArea').classList.add('show'); $('progressBar').style.width = '0%';
  $('progressText').textContent = '正在处理...';
  animateTo(80, 800);

  const fd = new FormData();
  fd.append('pdf', selectedFile);
  fd.append('pages', pagesVal);

  try {
    const data = await fetch(endpoint, { method: 'POST', body: fd }).then(r => r.json());
    $('progressBar').style.width = '100%'; $('progressText').textContent = '完成';
    if (data.success) totalPages = data.originalPages;
    setTimeout(() => { $('progressArea').classList.remove('show'); showResult(data); }, 350);
  } catch { $('progressArea').classList.remove('show'); showError('网络错误，请重试'); }
  finally { $('actionBtn').disabled = false; updateBtn(); }
});

function showResult(data) {
  const r = $('result'); r.classList.add('show');
  if (!data.success) { r.innerHTML = failHtml(data.error); return; }
  _dlFile = data.file;
  const isRemove = op === 'remove';
  r.innerHTML = `
    <div class="result-header ok"><span class="result-icon">✅</span><span class="result-title">${isRemove ? '删除' : '提取'}成功！</span></div>
    <div class="result-body">
      <div class="stats">
        <div class="stat-box"><div class="stat-value">${data.originalPages}</div><div class="stat-label">原始页数</div></div>
        <div class="stat-box"><div class="stat-value green">${isRemove ? data.remainingPages : data.extractedPages}</div><div class="stat-label">${isRemove ? '剩余页数' : '提取页数'}</div></div>
        <div class="stat-box"><div class="stat-value">${fmtSize(data.size)}</div><div class="stat-label">文件大小</div></div>
      </div>
      <button class="btn btn-success" onclick="downloadFile(_dlFile)">⬇ 下载结果文件</button>
    </div>`;
}
function showError(msg) { $('result').classList.add('show'); $('result').innerHTML = failHtml(msg); }
function failHtml(msg) {
  return `<div class="result-header fail"><span class="result-icon">❌</span><span class="result-title">失败</span></div><div class="result-body"><p class="error-msg">${msg}</p></div>`;
}

setupPaste(t => t === 'application/pdf', f => selectFile(f));
</script>
</body>
</html>
