<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片转 PDF - PDF 工具箱</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .img-item {
      display: flex; align-items: center; gap: 10px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 9px; padding: 8px 12px;
      cursor: grab; transition: box-shadow 0.15s, background 0.15s;
      user-select: none;
    }
    .img-item:hover { background: #f5f3ff; border-color: #c4b5fd; }
    .img-item.dragging   { opacity: 0.4; }
    .img-item.drag-target { border-color: #6366f1; background: #ede9fe; }
    .img-thumb {
      width: 48px; height: 48px; object-fit: cover;
      border-radius: 5px; border: 1px solid #e5e7eb; flex-shrink: 0;
    }
    .img-thumb-placeholder {
      width: 48px; height: 48px; background: #f3f4f6;
      border-radius: 5px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .add-more-btn {
      width: 100%; padding: 9px; border: 1.5px dashed #c4b5fd;
      border-radius: 9px; background: #faf5ff; color: #6366f1;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
      position: relative; margin-top: 10px;
    }
    .add-more-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .add-more-btn:hover { background: #f5f3ff; border-color: #6366f1; }
    .hint { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/" class="logo">📦 PDF 工具箱</a>
  <div class="nav-links">
    <a href="/pdf_compress.html">🗜️ 压缩</a>
    <a href="/pdf_merge.html">🔗 合并</a>
    <a href="/pdf_split.html">✂️ 拆分</a>
    <a href="/pdf_rotate.html">🔄 旋转</a>
    <a href="/pdf_pages.html">📑 页面管理</a>
    <a href="/pdf_compare.html">🔍 比对</a>
    <a href="/img_to_pdf.html" class="active">🖼️ 图转PDF</a>
    <a href="/pdf_to_img.html">📸 PDF转图</a>
  </div>
</nav>

<div class="page">
<div class="card">
  <h1>图片转 PDF</h1>
  <p class="subtitle">将多张图片合并为一个 PDF，拖拽调整页面顺序</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="drop-icon">🖼️</div>
    <div class="drop-text">点击选择或拖拽图片文件</div>
    <div class="drop-hint">支持 JPG、PNG、WebP 等 · 最多 50 张</div>
  </div>

  <div class="file-list" id="imgList" style="margin-top:12px"></div>
  <p class="hint" id="dragHint" style="display:none">拖拽图片可调整页面顺序</p>

  <div id="addMoreArea" style="display:none">
    <button class="add-more-btn">
      <input type="file" id="addMoreInput" accept="image/*" multiple>
      ＋ 继续添加图片
    </button>
  </div>

  <button class="btn btn-primary" id="convertBtn" disabled>请先添加图片</button>

  <div class="progress-area" id="progressArea">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">正在转换...</div>
  </div>

  <div class="result" id="result"></div>
</div>
</div>

<script src="/common.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(2) + ' MB';

let images = []; // { file, id, objectUrl }
let dragSrc = null;
let _dlFile = null;

function uid() { return Math.random().toString(36).slice(2); }

function addImages(newFiles) {
  for (const f of newFiles) {
    if (!f.type.startsWith('image/')) { alert(`${f.name} 不是图片，已跳过`); continue; }
    if (images.length >= 50) { alert('最多支持 50 张图片'); break; }
    images.push({ file: f, id: uid(), objectUrl: URL.createObjectURL(f) });
  }
  render();
}

function removeImage(id) {
  const img = images.find(i => i.id === id);
  if (img) URL.revokeObjectURL(img.objectUrl);
  images = images.filter(i => i.id !== id);
  render();
}

function render() {
  const list = $('imgList');
  list.innerHTML = '';
  images.forEach(({ file, id, objectUrl }) => {
    const item = document.createElement('div');
    item.className = 'img-item';
    item.draggable = true;
    item.dataset.id = id;
    item.innerHTML = `
      <span class="drag-handle">⠿</span>
      <img class="img-thumb" src="${objectUrl}" alt="${file.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="img-thumb-placeholder" style="display:none">🖼️</div>
      <div class="fi-details">
        <div class="fi-name">${file.name}</div>
        <div class="fi-meta">${fmtSize(file.size)}</div>
      </div>
      <button class="fi-remove" data-id="${id}">✕</button>`;

    item.addEventListener('dragstart', e => { dragSrc = id; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend',   () => { dragSrc = null; item.classList.remove('dragging'); document.querySelectorAll('.img-item').forEach(el => el.classList.remove('drag-target')); });
    item.addEventListener('dragover',  e => { e.preventDefault(); if (dragSrc !== id) item.classList.add('drag-target'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-target'));
    item.addEventListener('drop', e => {
      e.preventDefault(); item.classList.remove('drag-target');
      if (!dragSrc || dragSrc === id) return;
      const si = images.findIndex(i => i.id === dragSrc);
      const di = images.findIndex(i => i.id === id);
      const [moved] = images.splice(si, 1);
      images.splice(di, 0, moved);
      render();
    });
    item.querySelector('.fi-remove').addEventListener('click', () => removeImage(id));
    list.appendChild(item);
  });

  const hasImages = images.length > 0;
  $('dragHint').style.display = images.length > 1 ? 'block' : 'none';
  $('addMoreArea').style.display = hasImages ? 'block' : 'none';
  $('convertBtn').disabled = !hasImages;
  $('convertBtn').textContent = hasImages ? `转换 ${images.length} 张图片为 PDF` : '请先添加图片';
  $('result').classList.remove('show');
}

$('fileInput').addEventListener('change', e => { addImages(e.target.files); e.target.value = ''; });
$('addMoreInput').addEventListener('change', e => { addImages(e.target.files); e.target.value = ''; });

const dz = $('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); addImages(e.dataTransfer.files); });

function animateTo(target, ms) {
  const start = parseFloat($('progressBar').style.width) || 0;
  const t0 = Date.now();
  (function step() {
    const pct = Math.min(start + (target - start) * (Date.now() - t0) / ms, target);
    $('progressBar').style.width = pct + '%';
    if (pct < target) requestAnimationFrame(step);
  })();
}

$('convertBtn').addEventListener('click', async () => {
  if (!images.length) return;
  $('convertBtn').disabled = true; $('convertBtn').textContent = '转换中...';
  $('result').classList.remove('show');
  $('progressArea').classList.add('show'); $('progressBar').style.width = '0%';
  $('progressText').textContent = '正在上传图片...';
  animateTo(35, 1000);

  const fd = new FormData();
  images.forEach(({ file }) => fd.append('images', file));
  fd.append('order', JSON.stringify(images.map((_, i) => i)));

  try {
    $('progressText').textContent = '正在生成 PDF...';
    animateTo(85, 1500);
    const data = await fetch('/api/img-to-pdf', { method: 'POST', body: fd }).then(r => r.json());
    $('progressBar').style.width = '100%'; $('progressText').textContent = '完成';
    setTimeout(() => { $('progressArea').classList.remove('show'); showResult(data); }, 350);
  } catch { $('progressArea').classList.remove('show'); showError('网络错误，请重试'); }
  finally { $('convertBtn').disabled = false; $('convertBtn').textContent = `转换 ${images.length} 张图片为 PDF`; }
});

function showResult(data) {
  const r = $('result'); r.classList.add('show');
  if (!data.success) { r.innerHTML = failHtml(data.error); return; }
  _dlFile = data.file;
  r.innerHTML = `
    <div class="result-header ok"><span class="result-icon">✅</span><span class="result-title">转换成功！</span></div>
    <div class="result-body">
      <div class="stats">
        <div class="stat-box"><div class="stat-value">${images.length}</div><div class="stat-label">图片数量</div></div>
        <div class="stat-box"><div class="stat-value green">${data.pageCount}</div><div class="stat-label">PDF 页数</div></div>
        <div class="stat-box"><div class="stat-value">${fmtSize(data.size)}</div><div class="stat-label">文件大小</div></div>
      </div>
      <button class="btn btn-success" onclick="downloadFile(_dlFile)">⬇ 下载 PDF</button>
    </div>`;
}
function showError(msg) { $('result').classList.add('show'); $('result').innerHTML = failHtml(msg); }
function failHtml(msg) {
  return `<div class="result-header fail"><span class="result-icon">❌</span><span class="result-title">失败</span></div><div class="result-body"><p class="error-msg">${msg}</p></div>`;
}

setupPaste(t => t.startsWith('image/'), f => addImages([f]));
</script>
</body>
</html>
