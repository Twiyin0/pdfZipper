<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 压缩 - PDF 工具箱</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="topnav">
  <a href="/" class="logo">📦 PDF 工具箱</a>
  <div class="nav-links">
    <a href="/pdf_compress.html" class="active">🗜️ 压缩</a>
    <a href="/pdf_merge.html">🔗 合并</a>
    <a href="/pdf_split.html">✂️ 拆分</a>
    <a href="/img_to_pdf.html">🖼️ 图转PDF</a>
    <a href="/pdf_to_img.html">📸 PDF转图</a>
  </div>
</nav>

<div class="page">
<div class="card">
  <h1>PDF 压缩</h1>
  <p class="subtitle">通过调整 DPI 和图像质量减小文件体积，自动选择最优算法</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf,application/pdf">
    <div class="drop-icon">📄</div>
    <div class="drop-text">点击选择或拖拽 PDF 文件</div>
    <div class="drop-hint">最大支持 100 MB</div>
  </div>

  <div class="file-list" id="fileInfo" style="display:none">
    <div class="file-item" style="cursor:default">
      <span class="fi-icon">📋</span>
      <div class="fi-details">
        <div class="fi-name" id="fileName"></div>
        <div class="fi-meta" id="fileSize"></div>
      </div>
      <button class="fi-remove" id="removeBtn">✕</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">质量预设</div>
    <div class="presets" id="presets">
      <button class="preset-btn" data-dpi="72"  data-q="50"><div class="preset-name">极小</div><div class="preset-desc">72 DPI</div></button>
      <button class="preset-btn" data-dpi="100" data-q="65"><div class="preset-name">低质量</div><div class="preset-desc">100 DPI</div></button>
      <button class="preset-btn active" data-dpi="150" data-q="80"><div class="preset-name">中等</div><div class="preset-desc">150 DPI</div></button>
      <button class="preset-btn" data-dpi="200" data-q="88"><div class="preset-name">高质量</div><div class="preset-desc">200 DPI</div></button>
      <button class="preset-btn" data-dpi="300" data-q="95"><div class="preset-name">打印</div><div class="preset-desc">300 DPI</div></button>
    </div>

    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-label">分辨率（DPI）</span>
        <span class="slider-value" id="dpiVal">150 DPI</span>
      </div>
      <input type="range" id="dpiSlider" min="72" max="300" step="1" value="150">
    </div>

    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-label">图像质量（JPEG）</span>
        <span class="slider-value" id="qualVal">80%</span>
      </div>
      <input type="range" id="qualSlider" min="10" max="95" step="1" value="80">
    </div>

    <div class="toggle-row">
      <span class="toggle-label">移除元数据</span>
      <label class="toggle"><input type="checkbox" id="optMeta" checked><span class="toggle-track"></span></label>
    </div>
  </div>

  <button class="btn btn-primary" id="compressBtn" disabled>选择文件后开始压缩</button>

  <div class="progress-area" id="progressArea">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">正在处理...</div>
  </div>

  <div class="result" id="result"></div>
</div>
</div>

<script src="/common.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(2) + ' MB';

let selectedFile = null;
let _dlFile = null;

// presets
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $('dpiSlider').value = btn.dataset.dpi;
    $('qualSlider').value = btn.dataset.q;
    updateLabels();
  });
});
function updateLabels() {
  $('dpiVal').textContent  = $('dpiSlider').value + ' DPI';
  $('qualVal').textContent = $('qualSlider').value + '%';
}
['dpiSlider','qualSlider'].forEach(id => $( id).addEventListener('input', updateLabels));

// file select
function selectFile(file) {
  if (!file || file.type !== 'application/pdf') { alert('请选择 PDF 文件'); return; }
  selectedFile = file;
  $('fileName').textContent = file.name;
  $('fileSize').textContent = fmtSize(file.size);
  $('fileInfo').style.display = 'flex';
  $('compressBtn').disabled = false;
  $('compressBtn').textContent = '开始压缩';
  $('result').classList.remove('show');
}
function clearFile() {
  selectedFile = null; $('fileInput').value = '';
  $('fileInfo').style.display = 'none';
  $('compressBtn').disabled = true;
  $('compressBtn').textContent = '选择文件后开始压缩';
  $('result').classList.remove('show');
  $('progressArea').classList.remove('show');
}
$('fileInput').addEventListener('change', e => { if (e.target.files[0]) selectFile(e.target.files[0]); });
$('removeBtn').addEventListener('click', clearFile);
const dz = $('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]); });

// progress
function animateTo(target, ms) {
  const start = parseFloat($('progressBar').style.width) || 0;
  const t0 = Date.now();
  (function step() {
    const pct = Math.min(start + (target - start) * (Date.now() - t0) / ms, target);
    $('progressBar').style.width = pct + '%';
    if (pct < target) requestAnimationFrame(step);
  })();
}

$('compressBtn').addEventListener('click', async () => {
  if (!selectedFile) return;
  const dpi = parseInt($('dpiSlider').value);
  const q   = parseFloat($('qualSlider').value) / 100;

  $('compressBtn').disabled = true; $('compressBtn').textContent = '压缩中...';
  $('result').classList.remove('show');
  $('progressArea').classList.add('show'); $('progressBar').style.width = '0%';
  $('progressText').textContent = '正在上传...';
  animateTo(25, 400);

  const fd = new FormData();
  fd.append('pdf', selectedFile);
  fd.append('dpi', dpi);
  fd.append('jpegQuality', q);
  fd.append('removeMetadata', $('optMeta').checked);

  try {
    $('progressText').textContent = `渲染页面 (${dpi} DPI)...`;
    animateTo(85, 2000);
    const data = await fetch('/api/compress', { method: 'POST', body: fd }).then(r => r.json());
    $('progressBar').style.width = '100%';
    $('progressText').textContent = '完成';
    setTimeout(() => { $('progressArea').classList.remove('show'); showResult(data, dpi, q); }, 350);
  } catch { $('progressArea').classList.remove('show'); showError('网络错误，请重试'); }
  finally { $('compressBtn').disabled = false; $('compressBtn').textContent = '重新压缩'; }
});

function showResult(data, dpi, q) {
  const r = $('result'); r.classList.add('show');
  if (!data.success) { r.innerHTML = failHtml(data.error); return; }
  const { originalSize: os, compressedSize: cs, ratio, saved, method } = data;
  const smaller = cs < os;
  _dlFile = data.file;
  const methodTag = method === 'stream'
    ? `<span class="method-tag stream">🔵 自动切换：对象流压缩</span>`
    : `<span class="method-tag dpi">🟣 DPI 渲染 (${dpi} DPI · ${Math.round(q*100)}%)</span>`;

  r.innerHTML = `
    <div class="result-header ${smaller?'ok':'warn'}">
      <span class="result-icon">${smaller?'✅':'ℹ️'}</span>
      <span class="result-title">${smaller?'压缩成功！':'已处理（原文件已是最优）'}</span>
    </div>
    <div class="result-body">
      <div class="stats">
        <div class="stat-box"><div class="stat-value">${fmtSize(os)}</div><div class="stat-label">原始大小</div></div>
        <div class="stat-box"><div class="stat-value ${smaller?'green':'red'}">${fmtSize(cs)}</div><div class="stat-label">压缩后</div></div>
        <div class="stat-box"><div class="stat-value ${smaller?'green':'red'}">${smaller?'-':'+'}${Math.abs(ratio)}%</div><div class="stat-label">${smaller?'节省':'增加'}</div></div>
      </div>
      <div style="text-align:center;margin-bottom:10px">${methodTag}</div>
      ${smaller?`<div class="info-row">节省 <strong>${fmtSize(Math.abs(saved))}</strong></div>`:''}
      <button class="btn btn-success" onclick="downloadFile(_dlFile)">⬇ 下载压缩文件</button>
    </div>`;
}
function showError(msg) {
  $('result').classList.add('show');
  $('result').innerHTML = failHtml(msg);
}
function failHtml(msg) {
  return `<div class="result-header fail"><span class="result-icon">❌</span><span class="result-title">失败</span></div><div class="result-body"><p class="error-msg">${msg}</p></div>`;
}

setupPaste(t => t === 'application/pdf', f => selectFile(f));
</script>
</body>
</html>
